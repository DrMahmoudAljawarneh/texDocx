<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>texDocx — LaTeX Converter</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0d1117; color: #c9d1d9; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; display: flex; justify-content: center; padding: 2rem 1rem; }
  .container { max-width: 800px; width: 100%; }
  h1 { font-size: 1.6rem; font-weight: 600; margin-bottom: .25rem; }
  p.sub { color: #8b949e; margin-bottom: 1.5rem; font-size: .9rem; }

  .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 1.5rem; margin-bottom: 1rem; }
  .card h2 { font-size: 1.1rem; margin-bottom: 1rem; }

  .form-group { margin-bottom: 1rem; }
  label { display: block; font-size: .85rem; font-weight: 500; margin-bottom: .35rem; color: #8b949e; }
  input[type="file"] { display: block; width: 100%; padding: .5rem; background: #0d1117; border: 1px dashed #30363d; border-radius: 6px; color: #c9d1d9; cursor: pointer; }
  input[type="file"]:hover { border-color: #58a6ff; }
  textarea, select { width: 100%; padding: .5rem; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: #c9d1d9; font-family: "SF Mono", "Fira Code", monospace; font-size: .85rem; }
  textarea:focus, select:focus { outline: none; border-color: #58a6ff; }
  textarea { min-height: 70px; resize: vertical; }

  .row { display: flex; gap: .75rem; }
  .row > * { flex: 1; }

  button { background: #238636; color: #fff; border: none; border-radius: 6px; padding: .6rem 1.5rem; font-size: .95rem; font-weight: 500; cursor: pointer; transition: background .15s; }
  button:hover { background: #2ea043; }
  button:disabled { opacity: .5; cursor: not-allowed; }
  button.danger { background: #da3633; }
  button.danger:hover { background: #f85149; }

  .console-wrap { background: #0d1117; border: 1px solid #30363d; border-radius: 6px; height: 320px; overflow-y: auto; padding: .75rem; font-family: "SF Mono", "Fira Code", monospace; font-size: .8rem; line-height: 1.5; }
  .console-wrap .info { color: #8b949e; }
  .console-wrap .warning { color: #d29922; }
  .console-wrap .error { color: #f85149; }
  .console-wrap .fatal { color: #bc8cff; }
  .console-wrap .dim { color: #484f58; }

  .status-bar { display: flex; align-items: center; gap: .75rem; margin-top: .75rem; }
  .spinner { width: 18px; height: 18px; border: 2px solid #30363d; border-top-color: #58a6ff; border-radius: 50%; animation: spin .6s linear infinite; display: none; }
  .spinner.active { display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .downloads { display: flex; gap: .5rem; flex-wrap: wrap; margin-top: .75rem; }
  .downloads a { display: inline-block; padding: .4rem .9rem; background: #21262d; border: 1px solid #30363d; border-radius: 6px; color: #58a6ff; text-decoration: none; font-size: .85rem; }
  .downloads a:hover { background: #30363d; }
  .hidden { display: none !important; }

  .badge { display: inline-block; font-size: .75rem; padding: .15rem .5rem; border-radius: 10px; font-weight: 500; }
  .badge.pending { background: #21262d; color: #8b949e; }
  .badge.processing { background: #1f3a4a; color: #58a6ff; }
  .badge.success { background: #1b3a2b; color: #3fb950; }
  .badge.failure { background: #3a1b1b; color: #f85149; }

  #task-id { font-family: "SF Mono", monospace; font-size: .85rem; }
</style>
</head>
<body>
<div class="container">
  <h1>texDocx</h1>
  <p class="sub">LaTeX → XML / DOCX conversion pipeline</p>

  <div class="card" id="upload-card">
    <h2>Upload Source</h2>
    <form id="upload-form">
      <div class="form-group">
        <label for="file">LaTeX file or .zip bundle</label>
        <input type="file" id="file" name="file" accept=".tex,.zip" required>
      </div>
      <div class="row">
        <div class="form-group">
          <label for="format">Output format</label>
          <select id="format" name="format">
            <option value="all">All (XML + DOCX)</option>
            <option value="xml">XML only</option>
            <option value="docx">DOCX only</option>
          </select>
        </div>
        <div class="form-group">
          <label for="macros">Custom macros (JSON)</label>
          <textarea id="macros" name="macros" placeholder='{"\\mycmd": "replacement"}'></textarea>
        </div>
      </div>
      <button type="submit" id="submit-btn">Submit</button>
    </form>
  </div>

  <div class="card hidden" id="status-card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem;">
      <h2 style="margin-bottom:0;">Job <span id="task-id-display"></span></h2>
      <span id="status-badge" class="badge pending">PENDING</span>
    </div>
    <div class="console-wrap" id="console"></div>
    <div class="status-bar">
      <span class="spinner" id="spinner"></span>
      <span id="progress-text" style="font-size:.85rem;color:#8b949e;"></span>
    </div>
    <div class="downloads" id="downloads"></div>
    <button class="danger hidden" id="retry-btn" style="margin-top:.75rem;">Retry with same file</button>
  </div>
</div>

<script>
(function () {
  const uploadCard = document.getElementById('upload-card');
  const statusCard = document.getElementById('status-card');
  const form = document.getElementById('upload-form');
  const fileInput = document.getElementById('file');
  const formatSelect = document.getElementById('format');
  const macrosInput = document.getElementById('macros');
  const submitBtn = document.getElementById('submit-btn');
  const taskIdDisplay = document.getElementById('task-id-display');
  const statusBadge = document.getElementById('status-badge');
  const consoleEl = document.getElementById('console');
  const spinner = document.getElementById('spinner');
  const progressText = document.getElementById('progress-text');
  const downloads = document.getElementById('downloads');
  const retryBtn = document.getElementById('retry-btn');

  let currentTaskId = null;
  let eventSource = null;
  let pollTimer = null;
  let lastUploadedFile = null;

  function appendLog(severity, message, line) {
    const d = document.createElement('div');
    const cls = severity.toLowerCase();
    d.className = cls;
    const prefix = line ? `[L${line}] ` : '';
    d.textContent = `${prefix}${message}`;
    consoleEl.appendChild(d);
    consoleEl.scrollTop = consoleEl.scrollHeight;
  }

  function setBadge(status) {
    const map = { PENDING: 'pending', PROCESSING: 'processing', SUCCESS: 'success', FAILURE: 'failure' };
    statusBadge.textContent = status;
    statusBadge.className = 'badge ' + (map[status] || 'pending');
  }

  function showStatus(taskId) {
    uploadCard.classList.add('hidden');
    statusCard.classList.remove('hidden');
    taskIdDisplay.textContent = taskId;
    consoleEl.innerHTML = '';
    downloads.innerHTML = '';
    retryBtn.classList.add('hidden');
    setBadge('PENDING');
    progressText.textContent = '';
  }

  function showUpload() {
    statusCard.classList.add('hidden');
    uploadCard.classList.remove('hidden');
    if (eventSource) { eventSource.close(); eventSource = null; }
    if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
    spinner.classList.remove('active');
  }

  function startSSE(taskId) {
    if (eventSource) eventSource.close();
    const url = `/jobs/${taskId}/logs/stream`;
    eventSource = new EventSource(url);

    eventSource.addEventListener('log', function (e) {
      try {
        const data = JSON.parse(e.data);
        appendLog(data.severity || 'Info', data.message, data.line_number);
      } catch { appendLog('Info', e.data); }
    });

    eventSource.addEventListener('complete', function (e) {
      eventSource.close();
      eventSource = null;
    });

    eventSource.onerror = function () {
      // SSE will auto-reconnect; don't treat transient errors as fatal
    };
  }

  function startPolling(taskId) {
    if (pollTimer) clearInterval(pollTimer);
    pollTimer = setInterval(function () {
      fetch(`/jobs/${taskId}/status`)
        .then(function (r) { return r.json(); })
        .then(function (data) {
          setBadge(data.status);
          if (data.progress_percent !== undefined) {
            progressText.textContent = data.progress_percent + '%';
          }
          if (data.status === 'PROCESSING') {
            spinner.classList.add('active');
          } else {
            spinner.classList.remove('active');
            if (data.status === 'SUCCESS' || data.status === 'FAILURE') {
              clearInterval(pollTimer);
              pollTimer = null;
              onComplete(taskId, data.status);
            }
          }
        })
        .catch(function () {});
    }, 2000);
  }

  function onComplete(taskId, status) {
    if (status === 'SUCCESS') {
      progressText.textContent = 'Complete';
      downloads.innerHTML = '<a href="/jobs/' + taskId + '/output/xml" download>Download XML</a>' +
        '<a href="/jobs/' + taskId + '/output/docx" download>Download DOCX</a>' +
        '<a href="/jobs/' + taskId + '/logs" download>Download Log</a>';
    } else {
      progressText.textContent = 'Failed';
      retryBtn.classList.remove('hidden');
    }
  }

  function submitUpload(file, format, macros) {
    var fd = new FormData();
    fd.append('file', file);
    fd.append('format', format);
    if (macros) fd.append('macros', macros);

    submitBtn.disabled = true;
    submitBtn.textContent = 'Submitting...';

    fetch('/jobs/submit', { method: 'POST', body: fd })
      .then(function (r) {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      })
      .then(function (data) {
        currentTaskId = data.task_id;
        showStatus(currentTaskId);
        startSSE(currentTaskId);
        startPolling(currentTaskId);
        submitBtn.disabled = false;
        submitBtn.textContent = 'Submit';
      })
      .catch(function (err) {
        appendLog('Error', 'Submission failed: ' + err.message);
        submitBtn.disabled = false;
        submitBtn.textContent = 'Submit';
      });
  }

  form.addEventListener('submit', function (e) {
    e.preventDefault();
    lastUploadedFile = fileInput.files[0];
    if (!lastUploadedFile) return;
    submitUpload(lastUploadedFile, formatSelect.value, macrosInput.value.trim());
  });

  retryBtn.addEventListener('click', function () {
    if (lastUploadedFile) {
      submitUpload(lastUploadedFile, formatSelect.value, macrosInput.value.trim());
    }
  });

  // Allow re-upload from status view by clicking the task ID
  taskIdDisplay.style.cursor = 'pointer';
  taskIdDisplay.title = 'Click to go back';
  taskIdDisplay.addEventListener('click', showUpload);
})();
</script>
</body>
</html>
